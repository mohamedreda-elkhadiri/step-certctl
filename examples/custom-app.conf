# Custom application certificate configuration
# This example shows how to manage certificates for a custom application

# Certificate and key file paths
CERT_FILE=/opt/myapp/tls/tls.crt
KEY_FILE=/opt/myapp/tls/tls.key

# Smallstep CA configuration
CA_URL=https://stepca.elkhadiri.net:9000
ROOT_CA=/etc/step/certs/root_ca.crt

# Certificate details
COMMON_NAME=myapp.elkhadiri.net
SAN=myapp.elkhadiri.net,myapp,IP:10.0.0.30

# Renewal settings
EXPIRES_IN=8h

# Post-renewal action - restart the application
RELOAD_CMD=systemctl restart myapp

# File ownership and permissions - use application user
OWNER=myapp
GROUP=myapp
CERT_MODE=0644
KEY_MODE=0600
