# Proxmox VE pveproxy certificate configuration
# This example shows how to manage Proxmox's web interface certificate

# Certificate and key file paths
CERT_FILE=/etc/pve/local/pveproxy-ssl.pem
KEY_FILE=/etc/pve/local/pveproxy-ssl.key

# Smallstep CA configuration
CA_URL=https://stepca.elkhadiri.net:9000
ROOT_CA=/etc/step/certs/root_ca.crt

# Certificate details
COMMON_NAME=pve01.elkhadiri.net
SAN=pve01.elkhadiri.net,pve01,10.0.0.10

# Renewal settings (hours: 8h, 24h — or days: 1d, 7d)
EXPIRES_IN=8h

# Provisioner (optional - uses CA default if not set)
# PROVISIONER=acme
# PROVISIONER_PASSWORD_FILE=/etc/step-certctl/provisioner-password

# Certificate template for custom subject metadata (optional)
# CERT_TEMPLATE=/etc/step-certctl/templates/pveproxy.tpl

# Post-renewal action
RELOAD_CMD=systemctl reload pveproxy

# File ownership and permissions
# NOTE: /etc/pve/local/ is managed by pmxcfs (Proxmox's FUSE filesystem) which
# controls permissions itself. These settings have no effect for pveproxy certs
# and should be omitted. pmxcfs sets 0640 root:www-data on all files automatically.
# OWNER=root
# GROUP=www-data
# CERT_MODE=0640
# KEY_MODE=0640
