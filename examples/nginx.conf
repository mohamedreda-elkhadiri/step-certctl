# Nginx web server certificate configuration
# This example shows how to manage nginx TLS certificates

# Certificate and key file paths
CERT_FILE=/etc/nginx/tls/fullchain.pem
KEY_FILE=/etc/nginx/tls/privkey.pem

# Smallstep CA configuration
CA_URL=https://stepca.elkhadiri.net:9000
ROOT_CA=/etc/step/certs/root_ca.crt

# Certificate details
COMMON_NAME=web01.elkhadiri.net
SAN=web01.elkhadiri.net,web01,*.elkhadiri.net,IP:10.0.0.20

# Renewal settings (hours: 8h, 24h — or days: 1d, 7d)
EXPIRES_IN=8h

# Post-renewal action
RELOAD_CMD=systemctl reload nginx

# File ownership and permissions
OWNER=root
GROUP=root
CERT_MODE=0644
KEY_MODE=0600
