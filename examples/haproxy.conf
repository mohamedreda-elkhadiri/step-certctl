# HAProxy load balancer certificate configuration
# HAProxy requires cert and key in a single PEM file

# Certificate and key file paths
# Note: For HAProxy, you may need to concatenate cert+key into one file
CERT_FILE=/etc/haproxy/certs/haproxy.pem
KEY_FILE=/etc/haproxy/certs/haproxy.key

# Smallstep CA configuration
CA_URL=https://stepca.elkhadiri.net:9000
ROOT_CA=/etc/step/certs/root_ca.crt

# Certificate details
COMMON_NAME=lb01.elkhadiri.net
SAN=lb01.elkhadiri.net,lb01,10.0.0.40

# Renewal settings (hours: 8h, 24h — or days: 1d, 7d)
EXPIRES_IN=8h

# Post-renewal action - combine cert+key and reload
# HAProxy needs cert and key in same file
RELOAD_CMD=cat /etc/haproxy/certs/haproxy.pem /etc/haproxy/certs/haproxy.key > /etc/haproxy/certs/combined.pem && systemctl reload haproxy

# File ownership and permissions
OWNER=root
GROUP=haproxy
CERT_MODE=0644
KEY_MODE=0600
